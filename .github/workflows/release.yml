name: Build and Release (Windows)

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      # =========================
      # 🔧 CACHING LAYER
      # =========================

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Nuitka
        uses: actions/cache@v3
        with:
          path: ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka

      - name: Cache AI Sidecar
        id: cache-ai
        uses: actions/cache@v3
        with:
          path: dist_ai
          key: ${{ runner.os }}-ai-${{ hashFiles('riemann-ai/**') }}

      # =========================
      # ⚙️ LANGUAGE SETUP
      # =========================

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install Global Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install maturin nuitka zstandard

      # =========================
      # 🧠 STAGE 1: AI SIDECAR
      # =========================

      - name: Install AI Dependencies
        run: pip install -r riemann-ai/requirements.txt

      - name: Compile AI Sidecar (Nuitka)
        if: steps.cache-ai.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $EXCLUDES = "--nofollow-import-to=torch --nofollow-import-to=transformers --nofollow-import-to=cv2 --nofollow-import-to=scipy --nofollow-import-to=pandas"
          $EXCLUDE_ARGS = $EXCLUDES.Split(" ")

          python -m nuitka `
              --standalone `
              --output-dir=dist_ai `
              @EXCLUDE_ARGS `
              riemann-ai/main.py

          if ($LASTEXITCODE -ne 0) { 
              Write-Host "FATAL ERROR: AI Engine Nuitka compilation failed." -ForegroundColor Red
              exit $LASTEXITCODE 
          }

      - name: Position AI Engine into Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "python-app\riemann\assets\riemann_ai_engine"
          Move-Item -Path "dist_ai\main.dist\*" -Destination "python-app\riemann\assets\riemann_ai_engine\" -Force
          Remove-Item -Recurse -Force dist_ai -ErrorAction SilentlyContinue

      # =========================
      # ⚙️ STAGE 2: MAIN APP
      # =========================

      - name: Install Main App Dependencies
        run: pip install -r requirements/requirements.txt

      - name: Build Rust Backend
        run: maturin develop --release

      - name: Move Rust Extension
        shell: python
        run: |
          import shutil, os, glob
          import riemann_core
          
          base_dir = os.path.dirname(riemann_core.__file__)
          libs = glob.glob(os.path.join(base_dir, '*.pyd'))
          
          if not libs:
              raise FileNotFoundError("FATAL: Could not find compiled Rust extension in " + base_dir)
          src = libs[0]
          
          dst = os.path.join('python-app', 'riemann', 'riemann_core.pyd')
          print(f"Moving {src} -> {dst}")
          shutil.copy2(src, dst)

      # =========================
      # 🚀 STAGE 3: FINAL BUILD
      # =========================

      - name: Build Main Application (Nuitka)
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$(Get-Location)\python-app"
          
          $EXCLUDES = "--nofollow-import-to=torch --nofollow-import-to=torchvision --nofollow-import-to=cv2 --nofollow-import-to=pix2tex --nofollow-import-to=transformers --nofollow-import-to=scipy --nofollow-import-to=pandas --nofollow-import-to=nvidia --nofollow-import-to=fitz --nofollow-import-to=pymupdf"
          $EXCLUDE_ARGS = $EXCLUDES.Split(" ")

          python -m nuitka `
              --onefile `
              --lto=no `
              --enable-plugin=pyside6 `
              --include-package=riemann `
              --include-data-dir=python-app/riemann/assets=riemann/assets `
              --include-data-file=libs/pdfium.dll=pdfium.dll `
              --windows-console-mode=disable `
              --output-dir=dist `
              --output-filename=Riemann.exe `
              @EXCLUDE_ARGS `
              build_entry.py

          if ($LASTEXITCODE -ne 0) { 
              Write-Host "FATAL ERROR: Main App Nuitka compilation failed." -ForegroundColor Red
              exit $LASTEXITCODE 
          }

      # =========================
      # 📦 STAGE 4: PACKAGE + RELEASE
      # =========================

      - name: Zip Artifact
        shell: bash
        run: |
          cd dist
          7z a ../Riemann-Windows.zip Riemann.exe

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Riemann-Windows.zip